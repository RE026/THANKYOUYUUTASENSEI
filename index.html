<script>

// =========================
// ★ここで速さを調整（小さいほど速い）
// =========================
let speed = 111;


// ↓↓↓ここから下は触らなくてOK↓↓↓
let i = 0;

function typing() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    
    setTimeout(typing, speed);
  }
}

typing();

</script>
